name: Fetch Oura Data

on:
  workflow_dispatch:

jobs:
  fetch-oura:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Oura data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)

          curl -s "https://api.ouraring.com/v2/usercollection/daily_sleep?start_date=$TODAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > daily_sleep_raw.json

          curl -s "https://api.ouraring.com/v2/usercollection/sleep?start_date=$TODAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > sleep_raw.json

          curl -s "https://api.ouraring.com/v2/usercollection/daily_readiness?start_date=$TODAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > readiness_raw.json

          curl -s "https://api.ouraring.com/v2/usercollection/daily_activity?start_date=$YESTERDAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > activity_raw.json

          python3 - <<'EOF'
          import json, datetime

          with open('daily_sleep_raw.json') as f:
              daily_sleep = json.load(f)
          with open('sleep_raw.json') as f:
              sleep = json.load(f)
          with open('readiness_raw.json') as f:
              readiness = json.load(f)
          with open('activity_raw.json') as f:
              activity = json.load(f)

          ds = daily_sleep['data'][0] if daily_sleep.get('data') else {}
          
          # Get the longest sleep session for detailed metrics
          sleep_sessions = sleep.get('data', [])
          s = max(sleep_sessions, key=lambda x: x.get('total_sleep_duration', 0)) if sleep_sessions else {}
          
          r = readiness['data'][0] if readiness.get('data') else {}
