name: Fetch Oura Data

on:
  schedule:
    - cron: '0 14 * * *'   # 7:00 AM PT daily
    - cron: '0 20 * * *'   # 1:00 PM PT daily
    - cron: '0 0 * * *'    # 5:00 PM PT daily
  workflow_dispatch:

jobs:
  fetch-oura:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run process.py
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: python3 process.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add oura_data.json
          git commit -m "Update Oura data $(date +%Y-%m-%d %H:%M)" || echo "No changes"
          git push
