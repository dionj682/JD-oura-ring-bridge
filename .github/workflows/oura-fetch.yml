name: Fetch Oura Data

on:
  workflow_dispatch:

jobs:
  fetch-oura:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch Oura data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: |
          curl -s "https://api.ouraring.com/v2/usercollection/daily_sleep?start_date=$(date +%Y-%m-%d)&end_date=$(date +%Y-%m-%d)" \
            -H "Authorization: Bearer $OURA_TOKEN" > sleep_raw.json
          
          curl -s "https://api.ouraring.com/v2/usercollection/daily_readiness?start_date=$(date +%Y-%m-%d)&end_date=$(date +%Y-%m-%d)" \
            -H "Authorization: Bearer $OURA_TOKEN" > readiness_raw.json

          curl -s "https://api.ouraring.com/v2/usercollection/daily_activity?start_date=$(date +%Y-%m-%d)&end_date=$(date +%Y-%m-%d)" \
            -H "Authorization: Bearer $OURA_TOKEN" > activity_raw.json

          python3 - <<'EOF'
          import json, datetime

          with open('sleep_raw.json') as f:
            sleep = json.load(f)
          with open('readiness_raw.json') as f:
            readiness = json.load(f)
          with open('activity_raw.json') as f:
            activity = json.load(f)

          s = sleep['data'][0] if sleep.get('data') else {}
          r = readiness['data'][0] if readiness.get('data') else {}
          a = activity['data'][0] if activity.get('data') else {}

          output = {
            "date": str(datetime.date.today()),
            "sleep": {
              "score": s.get('score'),
              "hrv": s.get('average_hrv'),
              "restingHeartRate": s.get('lowest_heart_rate'),
              "deepSleepSeconds": s.get('deep_sleep_duration'),
              "remSleepSeconds": s.get('rem_sleep_duration'),
              "restfulnessScore": s.get('restless_periods'),
              "totalSleepSeconds": s.get('total_sleep_duration')
            },
            "readiness": {
              "score": r.get('score'),
              "hrvBalance": r.get('contributors', {}).get('hrv_balance'),
              "bodyTemperature": r.get('contributors', {}).get('body_temperature'),
              "restingHeartRate": r.get('contributors', {}).get('resting_heart_rate')
            },
            "activity": {
              "date": str(datetime.date.today()),
              "steps": a.get('steps'),
              "activeCalories": a.get('active_calories'),
              "score": a.get('score')
            }
          }

          with open('oura_data.json', 'w') as f:
            json.dump(output, f, indent=2)
          EOF

      - name: Commit and push data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add oura_data.json
          git commit -m "Update Oura data $(date +%Y-%m-%d)" || echo "No changes"
          git push
