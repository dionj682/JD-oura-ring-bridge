name: Fetch Oura Data

on:
  workflow_dispatch:

jobs:
  fetch-oura:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Oura data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)

          curl -s "https://api.ouraring.com/v2/usercollection/daily_sleep?start_date=$TODAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > daily_sleep_raw.json

          curl -s "https://api.ouraring.com/v2/usercollection/sleep?start_date=$YESTERDAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > sleep_raw.json

          curl -s "https://api.ouraring.com/v2/usercollection/daily_readiness?start_date=$TODAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > readiness_raw.json

          curl -s "https://api.ouraring.com/v2/usercollection/daily_activity?start_date=$YESTERDAY&end_date=$TODAY" \
            -H "Authorization: Bearer $OURA_TOKEN" > activity_raw.json

          python3 process.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add oura_data.json
          git commit -m "Update Oura data $(date +%Y-%m-%d)" || echo "No changes"
          git push
